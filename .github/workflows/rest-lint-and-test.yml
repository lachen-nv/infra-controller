name: Lint and Test

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    working-directory: rest-api

env:
  GO_VERSION: "1.25.4"

jobs:
  style:
    name: Style Check
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: rest-api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Install and run revive
        run: |
          go install github.com/mgechev/revive@v1.3.9
          pkgs=$(go list ./... | grep -v $(go env GOMODCACHE))
          go list $pkgs | grep -v $(go env GOMODCACHE) | xargs -L1 revive -config .revive.toml -set_exit_status

      - name: Run go fmt
        run: |
          pkgs=$(go list ./... | grep -v $(go env GOMODCACHE))
          go fmt $pkgs > /dev/null 2>&1
          if git diff --quiet; then
            echo "go fmt was clean"
          else
            echo "::error::go fmt was unclean on the following files:"
            git -P diff --name-only
            exit 1
          fi

  lint-go:
    name: Lint Go
    runs-on: linux-amd64-cpu4
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: rest-api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.2
          args: --timeout=10m --issues-exit-code=0 ./...
          working-directory: rest-api

  lint-openapi:
    name: Lint OpenAPI
    runs-on: linux-amd64-cpu4
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli@latest

      - name: Run OpenAPI lint
        run: redocly lint ./openapi/spec.yaml --format=github-actions

  check-generated-files:
    name: Check Generated Files
    runs-on: ubuntu-latest
    continue-on-error: false
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check OpenAPI generated files are up to date
        run: |
          BASE="origin/main"
          if ! git rev-parse --verify "$BASE" >/dev/null 2>&1; then
            echo "Base branch $BASE not found, skipping check."
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE"...HEAD)

          if echo "$CHANGED" | grep -q '^rest-api/openapi/spec.yaml$'; then
            SDK_UPDATED=false
            DOCS_UPDATED=false
            echo "$CHANGED" | grep -q '^rest-api/sdk/standard/' && SDK_UPDATED=true
            echo "$CHANGED" | grep -q '^rest-api/docs/index.html$' && DOCS_UPDATED=true

            if [ "$SDK_UPDATED" = false ]; then
              echo "::warning::rest-api/sdk/standard/ was not updated. Please ensure you have run: make generate-sdk"
            fi
            if [ "$DOCS_UPDATED" = false ]; then
              echo "::warning::rest-api/docs/index.html was not updated. Please ensure you have run: make publish-openapi"
            fi

            if [ "$SDK_UPDATED" = false ] && [ "$DOCS_UPDATED" = false ]; then
              echo "::error::rest-api/openapi/spec.yaml was modified but neither rest-api/sdk/standard/ nor rest-api/docs/index.html was updated."
              exit 1
            fi
            echo "✓ rest-api/openapi/spec.yaml changed and generated files were also updated (sdk=$SDK_UPDATED, docs=$DOCS_UPDATED)."
          else
            echo "✓ rest-api/openapi/spec.yaml not changed, skipping generated files check."
          fi

  check-protobuf-generated:
    name: Check Protobuf Generated Code
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: rest-api/go.sum

      - name: Install buf and protoc plugins
        run: |
          go install github.com/bufbuild/buf/cmd/buf@latest
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Regenerate protobuf code
        run: |
          cd workflow-schema && buf generate
          cd flow && buf generate

      - name: Check for uncommitted changes
        run: |
          UNTRACKED=$(git ls-files --others --exclude-standard)

          MEANINGFUL_DIFF=$(git diff --unified=0 | grep '^[+-]' | grep -v '^[+-][+-][+-]' | grep -v '^[+-]//.*protoc-gen-go' | grep -v '^[+-]//.*protoc v' || true)

          if [ -z "$MEANINGFUL_DIFF" ] && [ -z "$UNTRACKED" ]; then
            echo "✓ Protobuf generated code is up to date."
          else
            echo "::error::Protobuf generated code is out of date. Please run 'make core-protogen' and 'make flow-protogen' and commit the results."
            echo ""
            echo "Changed files:"
            git status --porcelain
            echo ""
            echo "Diff:"
            git -P diff
            if [ -n "$UNTRACKED" ]; then
              echo ""
              echo "Untracked files:"
              echo "$UNTRACKED"
            fi
            exit 1
          fi

  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        module:
          - api
          - auth
          - cert-manager
          - common
          - db
          - ipam
          - powershelf-manager
          - nvswitch-manager
          - flow
          - site-agent
          - site-manager
          - site-workflow
          - workflow
          - workflow-schema

    services:
      postgres:
        image: postgres:14.4-alpine
        env:
          POSTGRES_DB: nicotest
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 30432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: "false"
      DB_NAME: nicotest
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 30432
      CGO_ENABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: rest-api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Tune PostgreSQL for faster tests
        run: |
          docker exec ${{ job.services.postgres.id }} \
            psql -U postgres -d nicotest -v ON_ERROR_STOP=1 \
              -c "ALTER SYSTEM SET fsync = 'off'" \
              -c "ALTER SYSTEM SET synchronous_commit = 'off'" \
              -c "ALTER SYSTEM SET full_page_writes = 'off'" \
              -c "ALTER SYSTEM SET autovacuum = 'off'" \
              -c "SELECT pg_reload_conf()"

      - name: Run unit tests for ${{ matrix.module }}
        run: |
          set -o pipefail
          echo "Testing module: ${{ matrix.module }}"

          if [ "${{ matrix.module }}" = "site-agent" ]; then
            make nico-mock-server-start
            make flow-mock-server-start
          fi

          go test -v -race -p 1 ./${{ matrix.module }}/... -coverprofile=coverage-${{ matrix.module }}.txt -covermode=atomic 2>&1 | tee test-output-${{ matrix.module }}.txt

          if [ "${{ matrix.module }}" = "site-agent" ]; then
            make nico-mock-server-stop
            make flow-mock-server-stop
          fi

      - name: Generate JUnit report
        if: always()
        run: |
          cat test-output-${{ matrix.module }}.txt | go-junit-report -set-exit-code > report-${{ matrix.module }}.xml || true

      - name: Display coverage summary
        if: always()
        run: |
          if [ -f coverage-${{ matrix.module }}.txt ]; then
            go tool cover -func coverage-${{ matrix.module }}.txt
          fi

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ matrix.module }}
          path: rest-api/report-${{ matrix.module }}.xml
          retention-days: 7

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    defaults:
      run:
        working-directory: .
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Download all test report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-report-*
          path: test-reports
          merge-multiple: true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-reports/**/*.xml
          check_name: Test Results
          comment_mode: always
          compare_to_earlier_commit: true
          job_summary: true
          report_individual_runs: true
          report_suite_logs: info
